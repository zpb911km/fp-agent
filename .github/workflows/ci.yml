# CI — 五块卵石代码质量检查
#
# 每次 push / PR 自动运行：
#   1. ruff lint + format 检查
#   2. Python 语法检查（AST 解析）
#   3. 版本一致性检查（所有子包使用统一版本管理）
#   4. 全部 5 个子包构建验证
#
# 设计目标：防止 AI 自修改引入语法错误或破坏构建，
#           为后续分支管理（main/dev/feature）提供基础保障。

name: CI

on:
  push:
    branches: ["main", "dev", "release/*"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ruff build

      - name: 🔍 Ruff Lint 检查
        run: ruff check .

      - name: 🔍 Ruff Format 检查
        run: ruff format --check .

      - name: 🔍 Python 语法检查（全部 .py 文件）
        run: |
          echo "检查所有 Python 文件语法..."
          find . -name "*.py" -not -path "*/.git/*" -not -path "*/__pycache__/*" \
            -not -path "*/.egg-info/*" -not -path "*/dist/*" \
            -exec python3 -c "
          import ast, sys
          errors = []
          for f in sys.argv[1:]:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  errors.append(f)
          if errors:
              print('❌ 语法错误文件:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          else:
              print('✅ 全部通过')
          " {} +

  build:
    name: 子包构建验证
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools-scm

      - name: 🔍 版本一致性检查
        run: |
          echo "检查所有子包版本配置..."
          errors=0
          for pkg in fp-core fp-terminal fp-webui fp-acp fp; do
            file="packages/$pkg/pyproject.toml"
            if grep -q 'dynamic = \["version"\]' "$file"; then
              echo "  ✅ $pkg: dynamic version"
            else
              echo "  ❌ $pkg: 缺少 dynamic = ['version']"
              errors=$((errors + 1))
            fi
            if grep -q 'setuptools-scm' "$file"; then
              echo "  ✅ $pkg: setuptools-scm"
            else
              echo "  ❌ $pkg: 缺少 setuptools-scm"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors 个版本配置错误"
            exit 1
          fi
          echo "✅ 全部子包版本配置一致"

      - name: 📋 文档版本与 tag 一致性检查
        run: |
          CURRENT_TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          if [ -n "$CURRENT_TAG" ]; then
            echo "当前 tag: $CURRENT_TAG"
            errors=0
            if ! grep -q "\\[$CURRENT_TAG\\]" docs/CHANGELOG.md; then
              echo "  ❌ docs/CHANGELOG.md 缺少 [$CURRENT_TAG] 条目"
              echo "     → 忘记运行 python scripts/bump_docs.py $CURRENT_TAG ... 了？"
              errors=$((errors + 1))
            else
              echo "  ✅ docs/CHANGELOG.md"
            fi
            for doc in docs/README.md docs/guide/快速开始.md docs/CONTRIBUTING.md .github/ISSUE_TEMPLATE/bug_report.md; do
              if [ -f "$doc" ] && ! grep -q "$CURRENT_TAG" "$doc" 2>/dev/null; then
                echo "  ⚠️  $doc 未包含版本 $CURRENT_TAG（可能是旧引用）"
              fi
            done
            if [ "$errors" -gt 0 ]; then
              echo "❌ 文档版本不匹配，请运行: python scripts/bump_docs.py $CURRENT_TAG YYYY-MM-DD"
              exit 1
            fi
            echo "✅ 文档版本与 git tag 一致"
          else
            echo "无 git tag，跳过文档版本检查"
          fi

      - name: 📦 构建 fp-core
        run: python -m build packages/fp-core

      - name: 📦 构建 fp-terminal
        run: python -m build packages/fp-terminal

      - name: 📦 构建 fp-webui
        run: python -m build packages/fp-webui

      - name: 📦 构建 fp-acp
        run: python -m build packages/fp-acp

      - name: 📦 构建 fp（主包）
        run: python -m build packages/fp

      - name: ✅ 验证所有构建产物
        run: |
          echo "构建产物列表:"
          find packages -name "*.whl" -o -name "*.tar.gz" | sort
