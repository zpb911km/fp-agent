# Release — 五块卵石发布到 PyPI
#
# 触发方式：
#   1. 自动：推送版本标签时（如 git tag 0.2.0 && git push --tags）
#   2. 手动：GitHub Actions 页面 → workflow_dispatch
#
# 前置条件（OIDC Trusted Publishing — 已在 PyPI 配置完成）：
#   - fp-agent, fp-core, fp-terminal, fp-webui, fp-acp
#   - 全部指向 zpb911km/fp-agent 仓库的 release.yml
#   - 无需管理任何 token

name: Release

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（仅构建，不上传）"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # 用于 OIDC Trusted Publishing

jobs:
  build:
    name: 构建所有子包
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以获取 git tag 版本号

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装构建工具
        run: pip install build

      - name: 📦 构建所有子包
        run: |
          mkdir -p dist
          for pkg in fp-core fp-terminal fp-webui fp-acp fp; do
            echo "=== 构建 packages/$pkg ==="
            python -m build "packages/$pkg"
            cp "packages/$pkg/dist/"* dist/
          done
          echo "=== 汇总产物 ==="
          ls -la dist/

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: 发布到 PyPI
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: 查看构建产物
        run: ls -la dist/

      - name: 📤 发布全部子包到 PyPI（OIDC）
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: dist

      - name: ✅ 发布完成
        run: |
          echo "✅ 已发布到 PyPI:"
          ls -la dist/
          echo ""
          echo "包列表："
          for f in dist/*.whl; do
            basename "$f" | sed 's/-py3.*//' | sed 's/_/-/g'
          done | sort -u
