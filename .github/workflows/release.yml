# Release — 五块卵石发布到 PyPI
#
# 触发方式：
#   1. 自动：推送 v* 标签时（如 git tag v0.1.0 && git push --tags）
#   2. 手动：GitHub Actions 页面 → workflow_dispatch
#
# 前置条件（只需配置一次）：
#
#   方式 A（推荐）— Trusted Publishing（更安全，无需管理密钥）：
#     1. 打开 https://pypi.org/manage/account/publishing/
#     2. 添加一个 OIDC publisher：
#        - PyPI Project: 依次添加 fp, fp-core, fp-cli, fp-webui, fp-acp
#        - GitHub Owner: zpb911km
#        - GitHub Repository: fp-agent
#        - Workflow Name: release.yml
#        - Environment: (留空)
#
#   方式 B — API Token（传统方式）：
#     1. 在 PyPI 上为每个包生成 API token
#     2. 在 GitHub 仓库 Settings → Secrets → Actions 中添加：
#        - PYPI_API_TOKEN_FP
#        - PYPI_API_TOKEN_CORE
#        - PYPI_API_TOKEN_CLI
#        - PYPI_API_TOKEN_WEBUI
#        - PYPI_API_TOKEN_ACP

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（仅构建，不上传）"
        type: boolean
        default: false

jobs:
  build:
    name: 构建所有子包
    runs-on: ubuntu-latest
    outputs:
      fp_tag: ${{ steps.get_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: 提取标签名
        id: get_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: 📦 构建所有子包
        run: |
          for pkg in fp-core fp-cli fp-webui fp-acp fp; do
            echo "=== 构建 packages/$pkg ==="
            python -m build "packages/$pkg"
          done

      - name: 📦 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/*

  publish:
    name: 发布到 PyPI
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # 用于 Trusted Publishing

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: 发布到 PyPI（Trusted Publishing）
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: dist
          # 如果使用 方式 B（API Token），取消下面的注释并注释掉上面的块
          # password: >
          #   ${{ secrets.PYPI_API_TOKEN_FP &&
          #   format('
          #   __token__:{0}', secrets.PYPI_API_TOKEN_FP) }}

      - name: ✅ 发布完成
        run: |
          echo "已发布到 PyPI:"
          ls -la dist/
